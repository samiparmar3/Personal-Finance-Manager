<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <header class="header">
            <h1>Personal Finance Manager</h1>

            <div class="summary">

                <div class="card">
                    <h3>Income</h3>
                    <p id="income">0</p>
                </div>

                <div class="card">
                    <h3>Expense</h3>
                    <p id="expense">0</p>
                </div>

                <div class="card">
                    <h3>Balance</h3>
                    <p id="balance">0</p>
                </div>

            </div>
        </header>

        <section class="form-section">

            <form id="finance-form">

                <div class="input-group">
                    <label for="type">Transaction Type</label>
                    <select id="type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="item-name">Item Name</label>
                    <input type="text" id="item-name" placeholder="Enter Item Name">
                </div>

                <div class="input-group">
                    <label for="category">Category</label>

                    <select id="category">
                        <option value="" disabled selected>Select Category</option>
                        <option value="Income">Income</option>
                        <option value="Food">Food</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Petrol">Petrol</option>
                        <option value="Study Material"> Study Material</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter Amount">
                </div>

                <button type="button" id="add-btn" onclick="check()">Add Transaction</button>

            </form>

        </section>

        <section class="history-section">

            <div class="section-header">
                <h2>Transaction History</h2>
            </div>

            <ul id="transaction-list"></ul>

        </section>

        <section class="analytics-section">

            <h2>Expense Analytics</h2>

            <div class="analytics-grid">

                <div class="analytics-card">
                    <span>Food</span>
                    <p>₹<span id="food-total">0</span></p>
                </div>

                <div class="analytics-card">
                    <span>Shopping</span>
                    <p>₹<span id="shopping-total">0</span></p>
                </div>

                <div class="analytics-card">
                    <span>Petrol</span>
                    <p>₹<span id="petrol-total">0</span></p>
                </div>

                <div class="analytics-card">
                    <span>Study Material</span>
                    <p>₹<span id="study-total">0</span></p>
                </div>

                <div class="analytics-card">
                    <span>Entertainment</span>
                    <p>₹<span id="entertainment-total">0</span></p>
                </div>

                <div class="analytics-card">
                    <span>Other</span>
                    <p>₹<span id="other-total">0</span></p>
                </div>

            </div>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
